name: CI

# Manual only: run from the Actions tab (or `gh workflow run ci.yml`) after a
# change that actually affects the build — not on every push/PR to main.
on:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Each host builds and tests the targets feasible on it; the union of the
        # three covers JVM, JS, Wasm/JS and every Kotlin/Native target. Disabled
        # targets are skipped via kotlin.native.ignoreDisabledTargets=true.
        #   - ubuntu  : JVM, JS, Wasm/JS, linuxX64
        #   - macos   : macos*/ios* (Apple Silicon), plus JVM/JS/Wasm
        #   - windows : mingwX64, plus JVM/JS/Wasm
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew check --stacktrace

      - name: Upload test reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.os }}
          path: '**/build/reports/tests/'
          if-no-files-found: ignore
          retention-days: 7
